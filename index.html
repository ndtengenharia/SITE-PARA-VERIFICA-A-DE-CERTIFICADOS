<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Validação de Certificados - NDT</title>

<style>

body{
font-family:Arial;
background:#f4f6f8;
margin:0;
padding:40px;
}

.container{
max-width:800px;
margin:auto;
background:white;
padding:40px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.1);
}

  .logo{
display:block;
margin:auto;
width:250px;
margin-bottom:15px;
}

h1{
text-align:center;
}

input{
padding:10px;
font-size:16px;
width:70%;
}

button{
padding:10px 20px;
font-size:16px;
cursor:pointer;
}

.result{
margin-top:20px;
padding:20px;
border-radius:8px;
}

.valid{
background:#e8f9ef;
border:1px solid #2ecc71;
}

.invalid{
background:#fdecea;
border:1px solid #e74c3c;
}

</style>
</head>

<body>

<div class="container">

<img src="logo" class="logo">

<p>Digite o código do certificado:</p>

<input id="code" placeholder="Ex: NDT-E-C-001-2026">

<button onclick="verificar()">Verificar</button>

<div id="resultado" class="result"></div>

</div>

<script>

  document.getElementById("code").addEventListener("keypress", function(event) {
  if (event.key === "Enter") {
    verificar();
  }
});

async function verificar(){

const res = await fetch("certificados.json")

const banco = await res.json()

const codigo = document.getElementById("code").value.trim().toUpperCase()

const cert = banco.find(c => c.codigo === codigo)

const div = document.getElementById("resultado")

if(cert){

div.className="result valid"

div.innerHTML = `
<b>Certificado válido</b><br><br>

<b>Código:</b>${cert.codigo}<br>
<b>Nome:</b>${cert.nome}<br>
<b>Curso:</b>${cert.curso}<br>
<b>Carga horária:</b>${cert.carga}<br>
<b>Data:</b>${cert.data}<br>
<b>Responsável:</b>${cert.responsavel}
`

}else{

div.className="result invalid"

div.innerHTML="Certificado não encontrado"

}

}

</script>

</body>
</html>
